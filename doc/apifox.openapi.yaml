components:
  parameters:
    IdOrKey:
      in: path
      name: idOrKey
      required: true
      schema:
        type: string

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    sig_timestamp:
      type: apiKey
      in: header
      name: timestamp
      description: 毫秒时间戳（Number）
    sig_nonce:
      type: apiKey
      in: header
      name: nonce
      description: 随机字符串，需避免重复（防重放）
    sig_signature:
      type: apiKey
      in: header
      name: signature
      description: HMAC-SHA256 hex（详见服务端签名算法）
    sig_appkey:
      type: apiKey
      in: header
      name: appkey
      description: App Key（部分接口兼容使用 client-id）
    sig_client_id:
      type: apiKey
      in: header
      name: client-id
      description: OpenAPI Client ID（也可作为 appkey 的兼容头）

  schemas:
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
          nullable: true
        data:
          nullable: true
          description: 具体返回数据，结构随接口而变
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items: {}
            - type: string
            - type: number
            - type: boolean
    IssueCreateRequest:
      type: object
      description: 创建工单请求体（对应 IssuePayload）
      required: [summary, description, service, priority]
      properties:
        summary:
          type: string
          description: 标题（必填）
          example: "服务器异常"
        description:
          type: string
          description: 描述（必填）
          example: "xxx 服务不可用，影响范围..."
        service:
          type: string
          description: 服务类型（必填）
          example: "SERVER"
        priority:
          type: string
          description: 优先级（必填）
          example: "P1"
        impactLevel:
          type: string
          description: 影响等级（可选）
        alarmId:
          type: string
          description: 告警 ID（可选）
        relativeIssueId:
          type: string
          description: 关联工单 ID（可选）
        authorizedChangeContent:
          type: string
          description: 授权变更内容（可选）
        issuetype:
          type: string
          description: 工单类型（可选）
        reporter:
          type: string
          description: 提单人（可选）
        assignee:
          type: string
          description: 处理人（可选）
        snCode:
          type: string
          description: SN Code（可选）
        relatedSN:
          type: string
          description: 关联 SN（可选）
        serverSn:
          type: string
          description: 服务器 SN（可选）
        networkSn:
          type: string
          description: 网络设备 SN（可选）
        faultType:
          type: string
          description: 故障类型 code（可选）
        isDown:
          type: boolean
          description: 是否宕机（可选）
        syncToCustomer:
          type: boolean
          description: 是否同步到客户（可选）
        maintenanceOperation:
          type: string
          description: 维护操作（可选）
        operationPermissions:
          type: string
          description: 操作权限（可选）
        estimatedStartDate:
          type: string
          description: 预计开始时间（可选）
        status:
          type: string
          description: 状态（可选）
      additionalProperties: true
    IssueUpdateRequest:
      type: object
      description: 更新工单请求体（对应 IssueUpdatePayload，建议至少传 comment）
      required: [comment]
      properties:
        comment:
          type: string
          description: 修改说明（必填，IssueUpdatePayload 要求）
          example: "更新处理人/状态"
      additionalProperties: true
    IssueAssignRequest:
      type: object
      required: [assignee]
      properties:
        assignee:
          type: string
          description: 指派给的用户名（必填）
      additionalProperties: false
    IssueChangeStateRequest:
      type: object
      required: [stateId]
      properties:
        stateId:
          type: string
          description: 目标状态 ID（必填）
        stateName:
          type: string
          description: 目标状态名称（可选）
      additionalProperties: false
    IssueExportRequest:
      type: object
      description: 导出工单请求体（在 IssueQueryPayload 基础上，额外要求 fields）
      required: [fields]
      properties:
        fields:
          type: array
          items: { type: string }
          description: 导出字段 key 列表（必填，且必须在服务端允许范围内）
          example: ["key", "summary", "status"]
      additionalProperties: true
