openapi: 3.0.3
info:
  title: ITSM API Server
  description: |
    由代码路由自动整理的 OpenAPI 3.0 文档，可直接导入 Apifox。

    鉴权说明：
    - 后台接口通常同时要求：
      - JWT：`Authorization: Bearer <token>`
      - 签名：`timestamp`、`nonce`、`signature`，以及 `appkey`（或兼容老头 `client-id`）
    - OpenAPI 对外接口（`/open/*`）要求：
      - `client-id` + `timestamp`、`nonce`、`signature`
  version: 1.0.0
servers:
  - url: http://localhost:3000
tags:
  - name: Health
  - name: Auth
  - name: Jira
  - name: Orders
  - name: Issues
  - name: IDC Issues
  - name: OpenAPI
  - name: Users
  - name: Services
  - name: Priorities
  - name: Menus
  - name: Roles
  - name: Groups
  - name: Service Categories
  - name: SLA Rules
  - name: SLA Days
  - name: Service Fault Types
  - name: Final Service Fault Types
  - name: Alerts
  - name: Downtime Records

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /oauth/login:
    post:
      tags: [Auth]
      summary: 登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: 登录结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /oauth/refresh:
    post:
      tags: [Auth]
      summary: 刷新 Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: 刷新结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /oauth/logout:
    post:
      tags: [Auth]
      summary: 登出
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: 登出结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /oauth/token:
    post:
      tags: [Auth]
      summary: 获取/兑换 Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /oauth/protected:
    get:
      tags: [Auth]
      summary: 受保护测试接口
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /oauth/admin-only:
    get:
      tags: [Auth]
      summary: 仅管理员接口
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /oauth/getUserPermissions:
    post:
      tags: [Auth]
      summary: 获取用户权限（需要签名）
      security:
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_appkey: []
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_client_id: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/jira/test:
    post:
      tags: [Jira]
      summary: Jira 测试
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/jira/list:
    post:
      tags: [Jira]
      summary: Jira 列表
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/order/getOrders:
    post:
      tags: [Orders]
      summary: 获取订单（签名 + JWT）
      security:
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_appkey: []
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_client_id: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /api/order/getOrdersNoSign:
    post:
      tags: [Orders]
      summary: 获取订单（仅 JWT）
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /issue:
    get:
      tags: [Issues]
      summary: 工单列表
      security:
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_appkey: []
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_client_id: []
      parameters:
        - in: query
          name: pageIndex
          schema: { type: integer, minimum: 1, default: 1 }
          description: 页码（默认 1）
        - in: query
          name: pageSize
          schema: { type: integer, minimum: 1, default: 10 }
          description: 每页条数（默认 10）
        - in: query
          name: issuetype
          schema: { type: string }
          description: 工单类型（如 issue / idc 等）
        - in: query
          name: key
          schema: { type: string }
          description: 按 Jira Key 查询
        - in: query
          name: status
          schema: { type: string }
          description: 状态（如 PBD-INPRORESS / PBD-CLOSED 等）
        - in: query
          name: assignee
          schema: { type: string }
          description: 处理人（用户名）
        - in: query
          name: reporter
          schema: { type: string }
          description: 提单人（支持 rn / alarm 别名，服务端会映射到真实用户）
        - in: query
          name: service
          schema: { type: string }
          description: 服务类型（SERVER / NETWORK / RACK 等）
        - in: query
          name: priority
          schema: { type: string }
          description: 优先级
        - in: query
          name: impactLevel
          schema: { type: string }
          description: 影响等级
        - in: query
          name: relativeIssueId
          schema: { type: string }
          description: 关联工单 ID
        - in: query
          name: alarmId
          schema: { type: string }
          description: 告警 ID
        - in: query
          name: rnTicketId
          schema: { type: string }
          description: RN 工单 ID
        - in: query
          name: text
          schema: { type: string }
          description: 关键字（服务端透传给查询）
        - in: query
          name: createdDateStart
          schema: { type: string }
          description: 创建时间起（字符串，格式由调用方约定）
        - in: query
          name: createdDateEnd
          schema: { type: string }
          description: 创建时间止（字符串，格式由调用方约定）
        - in: query
          name: isFromPBD
          schema: { type: string, enum: ["true", "false", "1", "0", "yes", "no"] }
          description: 是否来自 PBD（服务端会做 bool 解析）
        - in: query
          name: authorizationStatus
          schema: { type: string }
          description: 授权状态（透传）
        - in: query
          name: isRnFault
          schema: { type: string }
          description: 是否 RN 故障（透传）
        - in: query
          name: authPermissionStatus
          schema: { type: string }
          description: 权限状态（透传）
        - in: query
          name: fields
          schema:
            oneOf:
              - type: string
              - type: array
                items: { type: string }
          description: 指定需要返回的字段（string 或 string[]，透传）
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
    post:
      tags: [Issues]
      summary: 创建工单
      security:
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_appkey: []
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_client_id: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueCreateRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /issue/{idOrKey}:
    get:
      tags: [Issues]
      summary: 工单详情
      security:
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_appkey: []
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_client_id: []
      parameters:
        - $ref: "#/components/parameters/IdOrKey"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
    put:
      tags: [Issues]
      summary: 更新工单
      security:
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_appkey: []
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_client_id: []
      parameters:
        - $ref: "#/components/parameters/IdOrKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueUpdateRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
    delete:
      tags: [Issues]
      summary: 删除工单
      security:
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_appkey: []
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_client_id: []
      parameters:
        - $ref: "#/components/parameters/IdOrKey"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /issue/{idOrKey}/assign:
    post:
      tags: [Issues]
      summary: 分配工单
      security:
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_appkey: []
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_client_id: []
      parameters:
        - $ref: "#/components/parameters/IdOrKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueAssignRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /issue/{idOrKey}/change-state:
    post:
      tags: [Issues]
      summary: 变更工单状态
      security:
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_appkey: []
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_client_id: []
      parameters:
        - $ref: "#/components/parameters/IdOrKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueChangeStateRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /issue/{idOrKey}/relatedIssues:
    get:
      tags: [Issues]
      summary: 获取关联工单
      security:
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_appkey: []
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_client_id: []
      parameters:
        - $ref: "#/components/parameters/IdOrKey"
        - in: query
          name: pageIndex
          schema: { type: integer, minimum: 1, default: 1 }
          description: 页码（默认 1）
        - in: query
          name: pageSize
          schema: { type: integer, minimum: 1, default: 10 }
          description: 每页条数（默认 10）
        - in: query
          name: issuetype
          schema: { type: string }
          description: 关联工单类型（透传）
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /issue/{idOrKey}/relatedMyIssues:
    get:
      tags: [Issues]
      summary: 获取关联我的工单
      security:
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_appkey: []
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_client_id: []
      parameters:
        - $ref: "#/components/parameters/IdOrKey"
        - in: query
          name: pageIndex
          schema: { type: integer, minimum: 1, default: 1 }
          description: 页码（默认 1）
        - in: query
          name: pageSize
          schema: { type: integer, minimum: 1, default: 10 }
          description: 每页条数（默认 10）
        - in: query
          name: issuetype
          schema: { type: string }
          description: 关联工单类型（透传）
        - in: query
          name: status
          schema: { type: string }
          description: 状态过滤（透传）
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /issue/export:
    post:
      tags: [Issues]
      summary: 导出工单（返回 xlsx）
      security:
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_appkey: []
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_client_id: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueExportRequest"
      responses:
        "200":
          description: Excel 文件
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        "400":
          description: 参数错误（如 fields 为空或包含非法字段）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /issue/upload-files:
    post:
      tags: [Issues]
      summary: 上传附件（multipart）
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [issueIdOrKey, files]
              properties:
                issueIdOrKey:
                  type: string
                  description: 目标工单 idOrKey（必填）
                files:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /issue/{issueIdOrKey}/comments:
    get:
      tags: [Issues]
      summary: 评论列表
      security:
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_appkey: []
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_client_id: []
      parameters:
        - in: path
          name: issueIdOrKey
          required: true
          schema:
            type: string
        - in: query
          name: pageIndex
          schema: { type: integer, minimum: 1, default: 1 }
          description: 页码（默认 1）
        - in: query
          name: pageSize
          schema: { type: integer, minimum: 1, default: 10 }
          description: 每页条数（默认 10）
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
    post:
      tags: [Issues]
      summary: 创建评论（可带附件）
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: issueIdOrKey
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                commentBody:
                  type: string
                  description: 评论内容（可选）
                updatePermission:
                  type: string
                  description: 是否更新 RN 权限（传 "1" 表示更新）
                  example: "1"
                updateStatus:
                  type: string
                  description: 可选，同时更新工单状态（透传状态码）
                  example: PBD-INPRORESS
                updatePermissionTime:
                  type: string
                  description: 权限更新时间（可选，Unix 秒时间戳字符串）
                  example: "1730000000"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /issue/{issueIdOrKey}/comments/{commentId}:
    get:
      tags: [Issues]
      summary: 评论详情
      security:
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_appkey: []
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_client_id: []
      parameters:
        - in: path
          name: issueIdOrKey
          required: true
          schema:
            type: string
        - in: path
          name: commentId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
    delete:
      tags: [Issues]
      summary: 删除评论
      security:
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_appkey: []
        - bearerAuth: []
          sig_timestamp: []
          sig_nonce: []
          sig_signature: []
          sig_client_id: []
      parameters:
        - in: path
          name: issueIdOrKey
          required: true
          schema:
            type: string
        - in: path
          name: commentId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /issue/comment/attachment/{id}/{filename}:
    get:
      tags: [Issues]
      summary: 获取附件内容（评论）
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: filename
          required: true
          schema: { type: string }
      responses:
        "200":
          description: 文件内容
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /issue/attachment/{id}/{filename}:
    get:
      tags: [Issues]
      summary: 获取附件内容
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: filename
          required: true
          schema: { type: string }
      responses:
        "200":
          description: 文件内容
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /issue/{issueIdOrKey}/postmortem:
    post:
      tags: [Issues]
      summary: Postmortem（可带附件）
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: issueIdOrKey
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                isGPUDropped:
                  type: string
                  description: 是否 GPU 掉卡（"1"=是，"0"=否）
                  example: "1"
                isLogNeeded:
                  type: string
                  description: 是否需要日志（透传）
                  example: "1"
                logCollectTime:
                  type: string
                  description: 日志收集时间（透传）
                postmortemServerSn:
                  type: string
                  description: GPU 掉卡服务器 SN（isGPUDropped="0" 时服务端会清空）
                postmortemFaultType:
                  type: string
                  description: 最终故障类型 code（透传）
                postmortemMaintenanceOperation:
                  type: string
                  description: 最终维护操作（透传）
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /issue/{issueIdOrKey}/manualFault:
    post:
      tags: [Issues]
      summary: 人工故障（可带附件）
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: issueIdOrKey
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                commentBody:
                  type: string
                  description: 评论内容（可选）
                fault_start_time:
                  type: string
                  description: 故障开始时间（透传）
                fault_end_time:
                  type: string
                  description: 故障结束时间（透传）
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"

  /issue/{issueIdOrKey}/manualConfirmResolved:
    post:
      tags: [Issues]
