apiVersion: v1
kind: Service
metadata:
  name: itsm-api-server-test
  namespace: pbd-test
  labels:
    app: itsm-api-server-test
    environment: test
    project: itsm-api-server
spec:
  type: NodePort
  selector:
    app: itsm-api-server-test
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
      # NodePort 范围: 30000-32767
      # 如果需要固定端口，取消下面的注释并指定端口
      # nodePort: 30083
  sessionAffinity: None
