apiVersion: apps/v1
kind: Deployment
metadata:
  name: itsm-api-server-test
  namespace: pbd-test
  labels:
    app: itsm-api-server-test
    environment: test
    project: itsm-api-server
  annotations:
    description: "ITSM API Server 测试环境"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: itsm-api-server-test
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: itsm-api-server-test
        environment: test
        project: itsm-api-server
    spec:
      containers:
        - name: itsm-api-server-test
          image: 10.137.208.6:19800/pbdcommon/itsm-api-server-test:v1.0.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "qa"
            - name: PORT
              value: "3000"
          envFrom:
            - configMapRef:
                name: itsm-api-server-test-config
                optional: false
            - secretRef:
                name: itsm-api-server-test-secret
                optional: false
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          # 可选: 挂载持久化存储（文件上传目录）
          # volumeMounts:
          #   - name: uploads
          #     mountPath: /app/uploads
      imagePullSecrets:
        - name: docker-secret
      restartPolicy: Always
      # 可选: 持久化存储卷
      # volumes:
      #   - name: uploads
      #     persistentVolumeClaim:
      #       claimName: itsm-api-server-test-pvc
